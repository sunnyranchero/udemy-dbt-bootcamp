models:
  - name: dim_listings_cleansed
    data_tests:
    - minimum_row_count:
        arguments:
          min_row_count: 1000
          
    columns:
      - name: listing_id
        # historically, this was called 'tests'
        data_tests:
          - unique
          - not_null

      - name: host_id
        data_tests:
          - not_null
          - relationships:
              # Denotes a foreign key to this to table below and what that column is called.
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']
      
      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values           

  
  - name: dim_hosts_cleansed
    description: '{{ doc("dim_hosts_cleansed") }}'

    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
        data_tests:
          - unique
          - not_null

      - name: host_name
        data_type: string
        data_tests:
          - not_null

      - name: is_superhost
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']

      - name: updated_at
        data_type: timestamp 

      - name: created_at
        data_type: timestamp  

  - name: dim_listings_with_hosts
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: source('airbnb', 'listings')
    columns: 
      - name: price
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: number
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              # I want 99% of my values to be between 50 and 500
              arguments:
                quantile: .99
                min_value: 50
                max_value: 500
          - dbt_expectations.expect_column_max_to_be_between:
              arguments:
                min_value: 0
                max_value: 5000
                config:
                  severity: warn


  - name: fct_reviews
    columns:
      - name: listing_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_listings_cleansed')
                field: listing_id
      
      - name: reviewer_name
        data_tests:
          - not_null

      - name: review_sentiment
        data_tests:
          - accepted_values:
              arguments:
                values: ['positive', 'neutral', 'negative']
        
      